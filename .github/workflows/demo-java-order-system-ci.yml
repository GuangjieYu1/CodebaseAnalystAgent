name: demo-java-order-system-ci

on:
  push:
    paths:
      - "demo_java_order_system/**"
      - ".github/workflows/demo-java-order-system-ci.yml"
  pull_request:
    paths:
      - "demo_java_order_system/**"
      - ".github/workflows/demo-java-order-system-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo_java_order_system
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test
